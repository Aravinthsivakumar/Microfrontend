spring.application.name=course-management
spring.datasource.url=jdbc:mysql://localhost:3306/course_mgmt
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

app.jwt.secret=YourSuperSecretKeyThatIsAtLeast256BitsLong12345678
app.jwt.expiration=86400000

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
app.upload.dir=uploads/certificates

server.port=8080